backend:
  name: git-gateway
  branch: main

media_folder: "images/blog"
public_folder: "/images/blog"

locale: es

collections:
  - name: "posts"
    label: "Posts del Blog"
    files:
      - label: "Todos los posts"
        name: "posts"
        file: "posts.json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.titulo}}"
            fields:
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Fecha", name: "fecha", widget: "datetime", format: "DD/MM/YYYY", date_format: "DD/MM/YYYY", time_format: false}
              - label: "Tipo"
                name: "tipo"
                widget: "select"
                options:
                  - {label: "Artículo", value: "Artículo"}
                  - {label: "Video", value: "Video"}
              - {label: "Imagen de portada", name: "imagen", widget: "image", required: false, hint: "Sube una imagen horizontal (1200x630px recomendado)"}
              - {label: "Resumen corto", name: "resumen", widget: "text", hint: "2-3 líneas que aparecen en la tarjeta del blog"}
              - {label: "Contenido completo", name: "contenido", widget: "markdown"}
              - {label: "URL de video (opcional)", name: "video_url", widget: "string", required: false, hint: "Pega el link de YouTube o TikTok si es un post de video"}
