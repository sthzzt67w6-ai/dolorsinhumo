<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{min-height:100vh;background:#0d0b09;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg::before{content:'';position:absolute;bottom:-20%;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse at center,rgba(180,60,20,0.18) 0%,rgba(210,90,20,0.08) 40%,transparent 70%);animation:breathe 4s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:0.7;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.15)}}
.smoke{position:absolute;bottom:0;border-radius:50%;animation:smoke linear infinite;opacity:0}
@keyframes smoke{0%{transform:translateY(0) scale(1) rotate(0deg);opacity:0}10%{opacity:0.4}90%{opacity:0.05}100%{transform:translateY(-100vh) scale(4) rotate(180deg);opacity:0}}
.page{position:relative;z-index:1;width:100%;max-width:400px;padding:52px 28px 60px;text-align:center}
.avatar{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;border-radius:50%;background:linear-gradient(145deg,#c0392b,#e67e22,#c0392b);background-size:200% 200%;animation:gradShift 3s ease infinite,fadeUp 0.7s ease both;margin-bottom:18px;box-shadow:0 0 0 1px rgba(192,57,43,0.3),0 0 30px rgba(192,57,43,0.4),0 0 60px rgba(192,57,43,0.15)}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.avatar svg{width:38px;height:38px;fill:rgba(255,255,255,0.95)}
.name{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;color:#f0e8de;letter-spacing:-0.01em;line-height:1;margin-bottom:8px;animation:fadeUp 0.7s ease 0.1s both}
.sub{font-size:0.72rem;font-weight:500;color:rgba(200,180,160,0.6);letter-spacing:0.22em;text-transform:uppercase;animation:fadeUp 0.7s ease 0.2s both;margin-bottom:36px}
.line{display:flex;align-items:center;gap:10px;margin-bottom:32px;animation:fadeUp 0.7s ease 0.25s both}
.line::before,.line::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(180,140,100,0.2))}
.line::after{background:linear-gradient(to left,transparent,rgba(180,140,100,0.2))}
.dot{width:3px;height:3px;border-radius:50%;background:rgba(192,57,43,0.7)}
.links{display:flex;flex-direction:column;gap:12px}
.btn{display:flex;align-items:center;gap:14px;padding:16px 20px 16px 16px;border-radius:16px;text-decoration:none;border:1px solid;transition:transform 0.18s ease,box-shadow 0.18s ease,border-color 0.18s ease;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.04),transparent);opacity:0;transition:opacity 0.18s ease}
.btn:hover{transform:translateY(-2px)}.btn:hover::before{opacity:1}.btn:active{transform:scale(0.98)}
.wa{background:rgba(18,140,126,0.08);border-color:rgba(18,140,126,0.25);animation:fadeUp 0.7s ease 0.35s both}
.wa:hover{box-shadow:0 6px 24px rgba(18,140,126,0.2);border-color:rgba(37,211,102,0.4)}
.wa .ico{background:linear-gradient(135deg,#25d366,#128c7e)}.wa .lbl{color:rgba(37,211,102,0.7)}
.web{background:rgba(180,57,30,0.08);border-color:rgba(180,57,30,0.25);animation:fadeUp 0.7s ease 0.47s both}
.web:hover{box-shadow:0 6px 24px rgba(192,57,43,0.22);border-color:rgba(192,57,43,0.45)}
.web .ico{background:linear-gradient(135deg,#c0392b,#e67e22)}.web .lbl{color:rgba(230,120,50,0.8)}
.mail{background:rgba(66,133,244,0.08);border-color:rgba(66,133,244,0.22);animation:fadeUp 0.7s ease 0.59s both}
.mail:hover{box-shadow:0 6px 24px rgba(66,133,244,0.18);border-color:rgba(66,133,244,0.4)}
.mail .ico{background:linear-gradient(135deg,#4285f4,#1a73e8)}.mail .lbl{color:rgba(100,160,255,0.8)}
.ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,0.35)}
.ico svg{width:22px;height:22px;fill:#fff}
.txt{flex:1;text-align:left}
.lbl{display:block;font-size:0.65rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:3px}
.ttl{display:block;font-size:0.97rem;font-weight:500;color:#ede5dc;letter-spacing:0.01em}
.arr{color:rgba(200,180,155,0.45);font-size:1rem;transition:transform 0.18s ease,color 0.18s ease}
.btn:hover .arr{transform:translateX(3px);color:rgba(200,180,155,0.85)}
.foot{margin-top:38px;font-size:0.65rem;font-weight:400;color:rgba(180,160,140,0.25);letter-spacing:0.15em;text-transform:uppercase;animation:fadeUp 0.7s ease 0.7s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
</style>
