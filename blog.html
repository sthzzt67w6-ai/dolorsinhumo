<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog | Dolor Sin Humo</title>
  <meta name="google-site-verification" content="mgidVFIQ5UGZ1JigwhAgDfgqRplMb48Tx3c75CjZeVI"/>
  <link rel="canonical" href="https://dolorsinhumo.com/blog.html"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#1a2332;line-height:1.7}
    nav{background:#0d1b2a;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
    nav a.logo{color:#fff;text-decoration:none;font-weight:800;font-size:1.15rem;letter-spacing:-.3px}
    nav a.back{color:#7ec8e3;font-size:.875rem;text-decoration:none;display:flex;align-items:center;gap:6px;opacity:.9}
    nav a.back:hover{opacity:1}
    .hero{background:linear-gradient(135deg,#0d1b2a 0%,#1a3a5c 100%);color:#fff;padding:56px 24px 48px;text-align:center}
    .hero .tag{display:inline-block;background:rgba(126,200,227,.2);color:#7ec8e3;border:1px solid rgba(126,200,227,.4);font-size:.75rem;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px}
    .hero h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;line-height:1.25;max-width:760px;margin:0 auto 16px;letter-spacing:-.5px}
    .hero .meta{color:rgba(255,255,255,.55);font-size:.875rem}
    .hero-img{width:100%;max-height:420px;object-fit:cover;display:block}
    .hero-img-wrap{max-height:420px;overflow:hidden}
    .container{max-width:760px;margin:0 auto;padding:48px 24px 80px}
    .content{font-size:1.0625rem;color:#2c3e50;background:#fff;border-radius:16px;padding:40px 48px;box-shadow:0 2px 24px rgba(0,0,0,.07)}
    .content h2{font-size:1.4rem;font-weight:700;color:#0d1b2a;margin:36px 0 12px;padding-top:8px;border-top:2px solid #f0f4f8}
    .content h2:first-child{border-top:none;margin-top:0}
    .content h3{font-size:1.1rem;font-weight:700;color:#1a3a5c;margin:24px 0 8px}
    .content p{margin-bottom:16px;color:#374151}
    .content ul,.content ol{margin:0 0 16px 20px}
    .content li{margin-bottom:8px;color:#374151}
    .content strong{color:#0d1b2a;font-weight:700}
    .content blockquote{border-left:4px solid #7ec8e3;padding:12px 20px;background:#f0f9ff;margin:20px 0;border-radius:0 10px 10px 0;color:#1a3a5c;font-style:italic}
    .video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin-bottom:28px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
    .video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%}
    .cta{background:linear-gradient(135deg,#0d1b2a,#1a3a5c);color:#fff;padding:36px 40px;border-radius:16px;text-align:center;margin-top:40px}
    .cta p{margin-bottom:16px;opacity:.9;font-size:.9rem}
    .cta strong{font-size:1.2rem;display:block;margin-bottom:8px}
    .cta a{display:inline-block;background:#25d366;color:#fff;padding:14px 32px;border-radius:10px;text-decoration:none;font-weight:700;font-size:1rem;box-shadow:0 4px 14px rgba(37,211,102,.4);transition:transform .2s}
    .cta a:hover{transform:translateY(-2px)}
    .not-found{text-align:center;padding:100px 20px;color:#64748b}
    .not-found h2{font-size:1.5rem;margin-bottom:12px}
    .not-found a{color:#7ec8e3}
    @media(max-width:640px){.content{padding:24px 20px}.hero{padding:40px 20px 36px}.cta{padding:28px 24px}}
  </style>
</head>
<body>
<nav>
  <a class="logo" href="/">Dolor Sin Humo</a>
  <a class="back" href="/#blog">← Volver al blog</a>
</nav>
<div id="hero-section"></div>
<div class="container">
  <div id="post-container"><p style="text-align:center;padding:60px;color:#64748b">Cargando...</p></div>
</div>
<script>
function slugify(t){return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');}
function embedVideo(url){
  if(!url) return '';
  if(url.includes('youtube.com')||url.includes('youtu.be')){
    const id=url.match(/(?:v=|youtu\.be\/)([\w-]{11})/)?.[1];
    return id?'<div class="video-wrap"><iframe src="https://www.youtube.com/embed/'+id+'" frameborder="0" allowfullscreen></iframe></div>':'';
  }
  if(url.includes('tiktok.com')){
    const id=url.match(/video\/(\d+)/)?.[1];
    return id?'<div class="video-wrap"><iframe src="https://www.tiktok.com/embed/v2/'+id+'" frameborder="0" allowfullscreen></iframe></div>':'';
  }
  return '';
}
async function loadPost(){
  const slug=new URLSearchParams(location.search).get('slug');
  const container=document.getElementById('post-container');
  const hero=document.getElementById('hero-section');
  try{
    const res=await fetch('/posts.json?v='+Date.now());
    if(!res.ok) throw new Error('no posts');
    const data=await res.json();
    const post=data.posts.find(p=>p.slug===slug||slugify(p.titulo)===slug);
    if(!post){container.innerHTML='<div class="not-found"><h2>Post no encontrado</h2><a href="/">← Inicio</a></div>';return;}
    document.title=post.titulo+' | Dolor Sin Humo';
    document.querySelector('link[rel=canonical]').href='https://dolorsinhumo.com/blog.html?slug='+(post.slug||slugify(post.titulo));
    // Hero
    let heroHtml='<div class="hero">';
    heroHtml+='<div class="tag">'+( post.tipo||'Artículo')+'</div>';
    heroHtml+='<h1>'+post.titulo+'</h1>';
    heroHtml+='<p class="meta">'+post.fecha+'</p>';
    heroHtml+='</div>';
    if(post.imagen) heroHtml+='<div class="hero-img-wrap"><img class="hero-img" src="'+post.imagen+'" alt="'+post.titulo+'"/></div>';
    hero.innerHTML=heroHtml;
    // Content
    let body='<div class="content">';
    if(post.video_url) body+=embedVideo(post.video_url);
    body+='<div id="md-content"></div>';
    body+='</div>';
    body+='<div class="cta"><strong>¿Tienes dolor o quieres mejorar tu movilidad?</strong><p>Agenda una sesión con nuestro equipo de fisioterapeutas.</p><a href="https://wa.me/573171370271" target="_blank">💬 Agenda por WhatsApp</a></div>';
    container.innerHTML=body;
    document.getElementById('md-content').innerHTML=marked.parse(post.contenido||'');
  }catch(e){container.innerHTML='<div class="not-found"><h2>Error cargando el post</h2><a href="/">← Inicio</a></div>';}
}
loadPost();
</script>
</body>
</html>
