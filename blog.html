<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog | Dolor Sin Humo</title>
  <meta name="google-site-verification" content="mgidVFIQ5UGZ1JigwhAgDfgqRplMb48Tx3c75CjZeVI"/>
  <link rel="canonical" href="https://dolorsinhumo.com/blog.html"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#f9f9f9;color:#1a1a1a}
    nav{background:#0d1b2a;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
    nav a{color:#fff;text-decoration:none;font-weight:700;font-size:1.2rem}
    nav .back{color:#7ec8e3;font-size:.9rem;text-decoration:none}
    nav .back:hover{text-decoration:underline}
    .container{max-width:780px;margin:40px auto;padding:0 20px}
    .tag{display:inline-block;background:#7ec8e3;color:#0d1b2a;font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px;text-transform:uppercase}
    h1{font-size:2rem;line-height:1.3;margin-bottom:12px;color:#0d1b2a}
    .meta{color:#888;font-size:.9rem;margin-bottom:28px}
    .hero-img{width:100%;max-height:420px;object-fit:cover;border-radius:12px;margin-bottom:32px}
    .content{line-height:1.8;font-size:1.05rem}
    .content h2{margin:28px 0 10px;color:#0d1b2a}
    .content h3{margin:20px 0 8px;color:#0d1b2a}
    .content p{margin-bottom:14px}
    .content ul,.content ol{margin:0 0 14px 24px}
    .content li{margin-bottom:6px}
    .content strong{color:#0d1b2a}
    .content blockquote{border-left:4px solid #7ec8e3;padding:10px 16px;background:#f0f8ff;margin:20px 0;border-radius:0 8px 8px 0}
    .video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin-bottom:28px}
    .video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%}
    .cta{background:#0d1b2a;color:#fff;padding:28px;border-radius:12px;text-align:center;margin-top:40px}
    .cta a{display:inline-block;margin-top:12px;background:#25d366;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:700}
    .not-found{text-align:center;padding:80px 20px;color:#888}
    @media(max-width:600px){h1{font-size:1.5rem}}
  </style>
</head>
<body>
<nav>
  <a href="/">Dolor Sin Humo</a>
  <a class="back" href="/#blog">← Volver al blog</a>
</nav>
<div class="container" id="post-container">
  <p style="text-align:center;padding:60px;color:#888">Cargando...</p>
</div>
<script>
async function loadPost() {
  const slug = new URLSearchParams(window.location.search).get('slug');
  const res = await fetch('/posts.json');
  const data = await res.json();
  const post = data.posts.find(p => p.slug === slug || slugify(p.titulo) === slug);
  const el = document.getElementById('post-container');
  if (!post) { el.innerHTML = '<div class="not-found"><h2>Post no encontrado</h2><p><a href="/">← Volver al inicio</a></p></div>'; return; }
  document.title = post.titulo + ' | Dolor Sin Humo';
  document.querySelector('link[rel=canonical]').href = 'https://dolorsinhumo.com/blog.html?slug=' + (post.slug || slugify(post.titulo));
  let html = '<span class="tag">' + (post.tipo||'Artículo') + '</span>';
  html += '<h1>' + post.titulo + '</h1>';
  html += '<p class="meta">' + post.fecha + '</p>';
  if (post.imagen) html += '<img class="hero-img" src="' + post.imagen + '" alt="' + post.titulo + '"/>';
  if (post.video_url && post.tipo === 'Video') {
    const vid = embedVideo(post.video_url);
    if (vid) html += '<div class="video-wrap">' + vid + '</div>';
  }
  html += '<div class="content" id="content"></div>';
  html += '<div class="cta"><strong>¿Tienes dolor o quieres mejorar tu movilidad?</strong><br/><a href="https://wa.me/573171370271" target="_blank">Agenda tu sesión por WhatsApp</a></div>';
  el.innerHTML = html;
  document.getElementById('content').innerHTML = marked.parse(post.contenido || '');
}
function slugify(t){ return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
function embedVideo(url){
  if(url.includes('youtube.com')||url.includes('youtu.be')){
    const id=url.match(/(?:v=|youtu\.be\/)([\w-]{11})/)?.[1];
    return id?'<iframe src="https://www.youtube.com/embed/'+id+'" frameborder="0" allowfullscreen></iframe>':'';
  }
  if(url.includes('tiktok.com')){
    return '<blockquote class="tiktok-embed" cite="'+url+'"><a href="'+url+'">Ver en TikTok</a></blockquote><script async src="https://www.tiktok.com/embed.js"><\/script>';
  }
  return '';
}
loadPost();
</script>
</body>
</html>
